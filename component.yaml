apiVersion: core.choreo.dev/v1beta1
kind: Component
metadata:
  name: tom-depp-bot
  description: Tom Depp - your chaotic Telegram friend
spec:
  type: Service
  source:
    language: python
    version: "3.11"
  build:
    buildCommand: pip install -r requirements.txt
  run:
    runCommand: python bot.py
  endpoints:
    - name: health
      port: 8080
      type: REST
      networkVisibility: Project
      context: /
